<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f1f1f" />
    <meta
      name="description"
      content="Soundwave — monthly favorite-song playlists from Jeremiah Rappley, streamed via embedded Apple Music playlists."
    />
    <title>Soundwave</title>
  </head>
  <body>
    <!-- GitHub Pages SPA fallback: decodes the "?/" path 404.html redirected to
         and restores the real URL before the app boots. Must run before main.tsx. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
